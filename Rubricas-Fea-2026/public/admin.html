<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin FEA 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; display: flex; min-height: 100vh; }
.sidebar { width: 250px; background: #111; height: 100vh; padding: 20px; border-right: 2px solid #00ffcc; overflow-y: auto; position: fixed; left: 0; top: 0; }
.sidebar h3 { color: #00ffcc; margin-bottom: 20px; text-align: center; font-size: 1.2rem; }
.sidebar button { width: 100%; margin-top: 15px; padding: 12px 15px; background: transparent; border: 1px solid #333; color: #fff; cursor: pointer; text-align: left; border-radius: 5px; transition: all 0.3s; }
.sidebar button:hover { background: #00ffcc; color: black; border-color: #00ffcc; }
.sidebar button.active { background: #00ffcc; color: black; border-color: #00ffcc; font-weight: bold; }
.content { flex: 1; margin-left: 250px; padding: 30px; overflow-y: auto; }
.header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #333; }
.header-admin h1 { font-size: 2rem; color: #00ffcc; }
.logout-btn { padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.logout-btn:hover { background: #cc0000; }
.section { display: none; }
.section.active { display: block; }
.home-logo { text-align: center; margin-top: 40px; }
.home-logo img { max-width: 300px; margin-bottom: 30px; border-radius: 10px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
.stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 20px; text-align: center; }
.stat-card .numero { font-size: 2.5rem; color: #00ffcc; font-weight: bold; margin-bottom: 10px; }
.stat-card .label { color: #999; font-size: 0.9rem; }
.table-container { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 20px; margin-top: 20px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #333; padding: 12px; text-align: left; }
th { background: #222; font-weight: bold; color: #00ffcc; }
tr:hover { background: #222; }
.filter-section { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-section input, .filter-section select { padding: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; }
.filter-section button { padding: 10px 20px; background: #00ffcc; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.btn-small { padding: 8px 12px; background: #0066ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
.btn-small:hover { background: #0052cc; }
.btn-download { padding: 8px 12px; background: #00aa44; color: white; border: none; border-radius: 5px; cursor: pointer; }
.btn-download:hover { background: #008833; }
h2 { color: #00ffcc; margin-bottom: 20px; margin-top: 30px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📊 ADMIN FEA</h3>
  <button class="nav-btn active" data-section="home" onclick="showSection('home')">Inicio</button>
  <button class="nav-btn" data-section="jueces" onclick="showSection('jueces')">Jueces</button>
  <button class="nav-btn" data-section="calificaciones" onclick="showSection('calificaciones')">Calificaciones</button>
  <button class="nav-btn" data-section="reportes" onclick="showSection('reportes')">Reportes</button>
  <button class="logout-btn" onclick="logout()">Salir</button>
</div>

<!-- CONTENIDO -->
<div class="content">

  <div class="header-admin">
    <h1>🎨 FEA 2026 - Admin</h1>
    <span id="usuario-admin"></span>
  </div>

  <!-- HOME -->
  <div id="home" class="section active">
    <div class="home-logo">
      <img src="Imagenes/26FEA.webp" alt="FEA 2026">
      <h2>Bienvenido al Panel Administrativo</h2>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="numero" id="total-jueces">0</div>
        <div class="label">Jueces Registrados</div>
      </div>
      <div class="stat-card">
        <div class="numero" id="total-calificaciones">0</div>
        <div class="label">Calificaciones</div>
      </div>
      <div class="stat-card">
        <div class="numero" id="total-obras">0</div>
        <div class="label">Obras Registradas</div>
      </div>
      <div class="stat-card">
        <div class="numero" id="promedio-puntaje">0</div>
        <div class="label">Promedio</div>
      </div>
    </div>
  </div>

  <!-- JUECES -->
  <div id="jueces" class="section">
    <h2>👥 Lista de Jueces</h2>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Rol</th>
          </tr>
        </thead>
        <tbody id="tabla-jueces">
          <tr><td colspan="3" style="text-align: center;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- CALIFICACIONES -->
  <div id="calificaciones" class="section">
    <h2>⭐ Calificaciones</h2>
    <div class="filter-section">
      <select id="filter-categoria" onchange="loadCalificaciones()">
        <option value="">Todas</option>
        <option value="musicales">Musicales</option>
        <option value="visuales">Visuales</option>
        <option value="literarias">Literarias</option>
        <option value="escenicas">Escénicas</option>
      </select>
      <button onclick="exportarExcel()">📥 Excel</button>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Obra</th>
            <th>Estudiante</th>
            <th>Disciplina</th>
            <th>Puntaje</th>
            <th>%</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-calificaciones">
          <tr><td colspan="6" style="text-align: center;">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- REPORTES -->
  <div id="reportes" class="section">
    <h2>📋 Reportes</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
      <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333;">
        <h3 style="color: #00ffcc; margin-bottom: 10px;">Listado Completo</h3>
        <button class="btn-download" onclick="exportarExcel()" style="width: 100%;">📥 Descargar Excel</button>
      </div>
    </div>
  </div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const rol = localStorage.getItem("rol");
const username = localStorage.getItem("username");

if (rol !== "admin") {
  window.location.href = "login.html";
}

document.getElementById("usuario-admin").textContent = `👤 ${username}`;

let calificacionesData = [];

window.showSection = function(sec) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  
  document.getElementById(sec).classList.add("active");
  document.querySelector(`[data-section="${sec}"]`).classList.add("active");

  if (sec === "jueces") loadJueces();
  if (sec === "calificaciones") loadCalificaciones();
  if (sec === "home") loadStats();
};

async function loadStats() {
  try {
    const jueces = await getDocs(collection(db, "usuarios"));
    const califDoc = await getDocs(collection(db, "calificaciones"));

    let totalPuntaje = 0;
    let obras = new Set();

    califDoc.forEach(doc => {
      const data = doc.data();
      totalPuntaje += parseInt(data.puntaje) || 0;
      obras.add(data.nombreObra);
    });

    document.getElementById("total-jueces").textContent = jueces.size;
    document.getElementById("total-calificaciones").textContent = califDoc.size;
    document.getElementById("total-obras").textContent = obras.size;
    document.getElementById("promedio-puntaje").textContent = califDoc.size > 0 ? Math.round(totalPuntaje / califDoc.size) : 0;
  } catch (error) {
    console.error("Error:", error);
  }
}

async function loadJueces() {
  try {
    const snap = await getDocs(collection(db, "usuarios"));
    const tbody = document.getElementById("tabla-jueces");
    tbody.innerHTML = "";

    snap.forEach(doc => {
      const d = doc.data();
      tbody.innerHTML += `<tr><td>${d.nombre}</td><td>${d.usuario}</td><td>${d.rol}</td></tr>`;
    });
  } catch (error) {
    tbody.innerHTML = `<tr><td colspan="3" style="color: red;">Error</td></tr>`;
  }
}

async function loadCalificaciones() {
  try {
    const snap = await getDocs(collection(db, "calificaciones"));
    const tbody = document.getElementById("tabla-calificaciones");
    tbody.innerHTML = "";

    const categoria = document.getElementById("filter-categoria").value;
    calificacionesData = [];

    snap.forEach(doc => {
      const d = doc.data();
      if (!categoria || d.categoria === categoria) {
        calificacionesData.push(d);
      }
    });

    if (calificacionesData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #999;">Sin calificaciones</td></tr>`;
      return;
    }

    calificacionesData.forEach((d, idx) => {
      const porcentaje = Math.round((d.puntaje / d.totalCriterios) * 100);
      tbody.innerHTML += `<tr>
        <td>${d.nombreObra || 'Sin nombre'}</td>
        <td>${d.estudiante || 'N/A'}</td>
        <td>${d.disciplina || 'N/A'}</td>
        <td>${d.puntaje}/${d.totalCriterios}</td>
        <td>${porcentaje}%</td>
        <td><button class="btn-small" onclick="descargarCV(${idx})">📄 CV</button></td>
      </tr>`;
    });
  } catch (error) {
    console.error("Error:", error);
  }
}

window.descargarCV = function(index) {
  const d = calificacionesData[index];
  const porcentaje = Math.round((d.puntaje / d.totalCriterios) * 100);
  
  const contenido = `
═══════════════════════════════════════════════════
CERTIFICADO - FEA 2026
═══════════════════════════════════════════════════

OBRA: ${d.nombreObra}
DISCIPLINA: ${d.disciplina}
CATEGORÍA: ${d.categoria}

PARTICIPANTE: ${d.estudiante}
INSTITUCIÓN: ${d.institucion}

CALIFICACIÓN:
Juez: ${d.juez}
Puntaje: ${d.puntaje}/${d.totalCriterios}
Porcentaje: ${porcentaje}%
Fecha: ${d.fecha || new Date().toLocaleDateString()}

OBSERVACIONES:
${d.observaciones || 'Sin observaciones'}

═══════════════════════════════════════════════════
  `;

  const blob = new Blob([contenido], {type: 'text/plain; charset=utf-8'});
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `CV_${d.estudiante}_${d.nombreObra}.txt`;
  a.click();
};

window.exportarExcel = function() {
  let csv = "Obra,Estudiante,Disciplina,Centro,Juez,Puntaje,Porcentaje\n";
  
  calificacionesData.forEach(d => {
    const porcentaje = Math.round((d.puntaje / d.totalCriterios) * 100);
    csv += `"${d.nombreObra}","${d.estudiante}","${d.disciplina}","${d.institucion}","${d.juez}","${d.puntaje}/${d.totalCriterios}","${porcentaje}%"\n`;
  });

  const blob = new Blob([csv], {type: 'text/csv; charset=utf-8'});
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Calificaciones_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
};

window.logout = function() {
  localStorage.clear();
  window.location.href = "login.html";
};

loadStats();

</script>

</body>
</html>
